name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Check & Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Active LTS and Current track the Node release calendar automatically.
        # Previous LTS is pinned; bump it once per year when a new even-numbered
        # Node major reaches LTS status.
        node-version: ["22", "lts", "latest"]
    steps:
      - uses: actions/checkout@v6

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: ${{ matrix.node-version }}
          cache: true

      # Build workspace packages before `vp check`. The oxlint type-aware
      # rules resolve workspace imports through the package's `exports`
      # field, but currently don't honor the `development` condition that
      # local dev relies on — they fall through to the `import`/`types`
      # conditions, which require `dist/` to exist. Bare `tsc --noEmit`
      # works either way because it does honor `customConditions`.
      - run: vp run -r build
      # Generate per-package codegen the type-check depends on (e.g. the
      # examples' Varlock `env.d.ts`, which is gitignored like `next-env.d.ts`).
      - run: vp run -r typegen
      - run: vp check
      - run: vp test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
