name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

# id-token must be at the workflow level for OIDC trusted publishing.
# Job-level permissions blocks replace (not merge) workflow-level ones, which
# can cause workflow_dispatch triggers to silently lose id-token access.
permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  changes:
    name: Detect Changes
    if: github.repository == 'discordkit/discordkit'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.result.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            version:
              - 'packages/*/package.json'
      - id: result
        run: echo "version=${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.version }}" >> $GITHUB_OUTPUT

  bump:
    name: Bump
    needs: [changes]
    if: needs.changes.outputs.version == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "lts"
          cache: true

      - run: vp dlx @varlock/bumpy ci plan
        env:
          GH_TOKEN: ${{ github.token }}

      - run: vp dlx @varlock/bumpy ci release
        env:
          GH_TOKEN: ${{ github.token }}
          BUMPY_GH_TOKEN: ${{ secrets.BUMPY_GH_TOKEN }}
          # Yarn 4 corrupts the tarball path Bumpy captures from stdout if
          # color codes are enabled. NO_COLOR alone is not enough for Yarn 4.
          NO_COLOR: "1"
          YARN_ENABLE_COLORS: "false"

  publish:
    name: Publish
    needs: [changes]
    if: needs.changes.outputs.version == 'true'
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.detect.outputs.published }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "lts"
          cache: true
          registry-url: "https://registry.npmjs.org"

      - run: vp run build

      - run: vp dlx @varlock/bumpy ci release
        env:
          GH_TOKEN: ${{ github.token }}
          BUMPY_GH_TOKEN: ${{ secrets.BUMPY_GH_TOKEN }}
          NO_COLOR: "1"
          YARN_ENABLE_COLORS: "false"

      # The `changes` job only knows whether `packages/*/package.json`
      # changed at all — not whether a real version bump happened. Bumpy
      # publishes to npm only when bump files were consumed, which it
      # signals by tagging the commit. Use the presence of tags pointing
      # at HEAD to gate the announcement job below: any toolchain or
      # metadata change that touches package.json without consuming a
      # bump file should NOT trigger an announcement.
      - id: detect
        run: |
          if git tag --points-at HEAD | grep -q .; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

  announce:
    name: Announce to Discord
    needs: [publish]
    if: needs.publish.outputs.published == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "lts"
          cache: true
      # Build the workspace packages first: webhook-action imports
      # @discordkit/client (+ transitively @discordkit/core) and resolves them
      # to their dist/ at runtime. This is a fresh job (separate runner from
      # `publish`), so their dist/ isn't present unless we build it here —
      # otherwise the action fails with ERR_MODULE_NOT_FOUND on core's dist.
      - run: vp run build
      - run: vp run build:apps
      - uses: ./apps/webhook-action
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_ID }}
          token: ${{ secrets.DISCORD_WEBHOOK_TOKEN }}
          content: "${GITHUB_REPOSITORY} was successfully published to npm!"
