  # TypeScript 7 (tsgo). Aliased to typescript-native-bridge: the native 7.0
  # `typescript` package ships no stable programmatic API until 7.1, so tsdown's
  # `.d.ts` emit (and typescript-eslint) crash on the missing `ts.sys` /
  # `createCompilerHost`. TNB is a drop-in `typescript` running the tsgo 7.x
  # engine behind the classic API surface. Drop the alias once vite-plus-core
  # supports native TS 7 (its peer is currently `^5 || ^6`).
  typescript: "npm:typescript-native-bridge@6.0.3-bridge.0.tsgo.7.0.2"
  valibot: ^1.4.2
  valimock: 1.6.0
  varlock: ^1.11.0
