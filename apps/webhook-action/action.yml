# action.yml
name: "Discord Webhook"
description: "Send a message to Discord via a webhook"
inputs:
  webhook:
    description: "the id of the webhook"
    required: true
  token:
    description: "the secure token of the webhook"
    required: true
  content:
    description: "the message contents (up to 2000 characters)"
    required: true
runs:
  # GitHub Actions has no evergreen LTS alias for JavaScript actions —
  # `using:` must be a pinned major (currently `node20` or `node24` are
  # accepted; `node22` is not). Bump this when the next supported
  # runtime is published.
  using: node24
  main: dist/index.mjs
